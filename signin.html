<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>
    <div class="container">
        <div class="heading">KALAISAN NATIONAL HIGH SCHOOL</div> 
        <form class="form" action="">
            <div class="input-field">
                <input type="text" required autocomplete="off" placeholder=" ">
                <label for="username">Full name</label>
            </div>

            <div class="input-field">
                <input type="email" required autocomplete="off" placeholder=" ">
                <label for="email">Email</label>
            </div>

            <div class="input-field">
                <input type="password" required autocomplete="off" placeholder=" ">
                <label for="password">Password</label>
            </div>

            <div class="btn-container">
                <button class="btn">Submit</button>
            </div>
            <div class="acc-text">
                Already have an account? <a href="Login.html">Log In</a>
            </div>
        </form>
    </div>
</body>
</html>
